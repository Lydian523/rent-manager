<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>出租房屋管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ================= 設計代幣 ================= */
:root{
  --bg:#F5F3EC; --card:#FFFFFF; --card2:#EFEDE4;
  --ink:#26312C; --ink2:#5F6B64; --line:#DDD9CC;
  --green:#2D5A4A; --green-soft:#E3EDE8;
  --red:#B54A35; --red-soft:#F6E3DE;
  --amber:#C98F2B; --amber-soft:#F5EBD6;
  --blue:#4A6B8A; --blue-soft:#E2EAF1;
  --violet:#6E5A80;
  --radius:14px; --shadow:0 1px 3px rgba(38,49,44,.08),0 4px 14px rgba(38,49,44,.06);
  --serif:"Georgia","Noto Serif TC","PMingLiU",serif;
  --sans:-apple-system,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
  --tabbar-height:86px;
  --bottom-safe-space:calc(var(--tabbar-height) + env(safe-area-inset-bottom) + 44px);
}
[data-theme="dark"]{
  --bg:#151917; --card:#1F2622; --card2:#262E29;
  --ink:#E4E9E5; --ink2:#93A099; --line:#333D37;
  --green:#5BA98D; --green-soft:#20352C;
  --red:#E07A5F; --red-soft:#3A241E;
  --amber:#E0B45C; --amber-soft:#38301B;
  --blue:#7FA3C4; --blue-soft:#1F2A34;
  --violet:#A98FC0;
  --shadow:0 1px 3px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:16px;
  padding-bottom:var(--bottom-safe-space);
  scroll-padding-bottom:var(--bottom-safe-space);}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--ink);
  background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--green);border-color:transparent}
label{font-size:13px;color:var(--ink2);display:block;margin:10px 0 4px}

/* ================= 頂欄 ================= */
header{position:sticky;top:0;z-index:30;background:var(--green);color:#fff;
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;display:flex;align-items:center;gap:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.15)}
header h1{font-size:18px;font-weight:700;letter-spacing:.05em;flex:1;display:flex;align-items:center;gap:8px;min-width:0}
.title-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.month-badge{display:inline-flex;align-items:center;justify-content:center;flex:none;
  border-radius:999px;padding:3px 8px;font-size:12px;font-weight:800;letter-spacing:.02em;line-height:1.25;
  background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.24)}
.month-badge.off-month{background:#F4D06F;color:#26312C;border-color:#FFE39A;box-shadow:0 0 0 2px rgba(244,208,111,.18)}
@media(max-width:380px){
  header{gap:7px;padding-left:12px;padding-right:12px}
  header h1{font-size:16px;gap:6px}
  .month-badge{font-size:11px;padding:3px 7px}
  .month-badge.off-month{font-size:10.5px}
}
.sync-dot{width:10px;height:10px;border-radius:50%;background:#9aa;flex:none}
.sync-dot.on{background:#7BE0A8}.sync-dot.q{background:#F0C36A}.sync-dot.off{background:#8b8b8b}
.icon-btn{background:rgba(255,255,255,.14);border:none;color:#fff;border-radius:10px;
  padding:7px 11px;font-size:15px}

/* ================= 底部導航 ================= */
nav.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;
  background:var(--card);border-top:1px solid var(--line);
  padding-bottom:max(env(safe-area-inset-bottom), 10px);
  min-height:var(--tabbar-height)}
nav.tabbar button{flex:1;background:none;border:none;padding:9px 0 7px;color:var(--ink2);
  font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px}
nav.tabbar button .ico{font-size:21px;line-height:1}
nav.tabbar button.act{background:var(--green);color:#fff;font-weight:700;
  border-radius:14px;margin:5px 7px;padding:5px 0 4px}
nav.tabbar button.act .ico{transform:scale(1.05)}

/* ================= 通用元件 ================= */
main{max-width:960px;margin:0 auto;padding:14px 14px var(--bottom-safe-space)}
main::after{content:"";display:block;height:calc(var(--tabbar-height) + env(safe-area-inset-bottom) + 16px)}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px 16px;margin-bottom:12px}
.card h2{font-size:15px;color:var(--ink2);font-weight:700;margin-bottom:10px;letter-spacing:.06em}
.btn{border:none;border-radius:10px;padding:11px 16px;font-size:15px;font-weight:600;
  background:var(--green);color:#fff}
.btn.sub{background:var(--card2);color:var(--ink)}
.btn.warn{background:var(--red)}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:8px}
.btn:disabled{opacity:.45}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.grow{flex:1}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600}
.pill.g{background:var(--green-soft);color:var(--green)}
.pill.r{background:var(--red-soft);color:var(--red)}
.pill.a{background:var(--amber-soft);color:var(--amber)}
.pill.b{background:var(--blue-soft);color:var(--blue)}
.pill.gr{background:var(--card2);color:var(--ink2)}
.pill.law{background:var(--red-soft);color:var(--red);border:1px solid rgba(181,74,53,.18)}
.month-tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.month-tools input[type=month]{max-width:170px;flex:1;min-width:150px}
.month-tools .btn{white-space:nowrap}
@media(max-width:420px){.month-tools{align-items:stretch}.month-tools input[type=month]{max-width:none}.month-tools .btn{flex:1}}
.muted{color:var(--ink2);font-size:13px}
.money{font-family:var(--serif);font-weight:700;font-variant-numeric:tabular-nums}
.divider{height:1px;background:var(--line);margin:10px 0}
.empty{text-align:center;color:var(--ink2);padding:26px 10px;font-size:14px}

/* ================= 警示列 ================= */
.alert{border-left:4px solid var(--amber);background:var(--amber-soft);color:var(--ink);
  border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:14px}
.alert.red{border-color:var(--red);background:var(--red-soft)}

/* ================= 鑰匙牆（房間卡片） ================= */
.bldg-title{font-size:14px;font-weight:700;color:var(--ink2);margin:16px 2px 8px;
  letter-spacing:.08em;display:flex;align-items:center;gap:8px}
.bldg-title::after{content:"";flex:1;height:1px;background:var(--line)}
.keywall{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:9px}
.keycard{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:11px 10px 9px;
  border:none;text-align:left;min-height:84px;display:flex;flex-direction:column;gap:6px}
.kc-row{display:flex;gap:9px;align-items:center;min-width:0}
.kc-av{width:40px;height:40px;border-radius:50%;background:var(--kc,#999);color:#fff;flex:none;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}
.kc-info{min-width:0}
.kc-nm{display:block;font-weight:700;font-size:15px;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kc-rn{display:block;font-size:12px;color:var(--ink2)}
.keycard .st{font-size:12.5px;font-weight:600;color:var(--kc)}
.keycard:active{transform:scale(.97)}

/* ================= 清單列 ================= */
.li{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line)}
.li:last-child{border-bottom:none}
.li .main{flex:1;min-width:0}
.li .t1{font-weight:600;font-size:15px}
.li .t2{font-size:12.5px;color:var(--ink2)}

/* ================= 分段控制 ================= */
.seg{display:flex;background:var(--card2);border-radius:11px;padding:3px;margin-bottom:12px;overflow-x:auto}
.seg button{flex:1;border:none;background:none;padding:8px 10px;border-radius:9px;font-size:14px;
  color:var(--ink2);font-weight:600;white-space:nowrap}
.seg button.act{background:var(--card);color:var(--green);box-shadow:var(--shadow)}
.twocol{display:grid;grid-template-columns:1fr;gap:12px;align-items:start}
@media(min-width:640px){.twocol{grid-template-columns:1fr 1.5fr}}
.li.todo{box-shadow:inset 4px 0 0 var(--amber)}
.chip{cursor:pointer}
.pill.chip{padding:6px 13px;font-size:13.5px;margin:3px 6px 3px 0;display:inline-block}
.cbtn{width:40px;height:40px;border-radius:50%;border:none;color:#fff;font-size:18px;flex:none;
  display:inline-flex;align-items:center;justify-content:center;text-decoration:none}
.cbtn.tel{background:var(--green)} .cbtn.sms{background:var(--blue)}

/* ================= 對話框 ================= */
.modal-bg{position:fixed;inset:0;background:rgba(20,25,22,.5);z-index:50;display:flex;
  align-items:flex-end;justify-content:center}
@media(min-width:640px){.modal-bg{align-items:center}}
.modal{background:var(--bg);border-radius:18px 18px 0 0;width:100%;max-width:560px;
  max-height:88vh;overflow-y:auto;padding:18px 18px calc(18px + env(safe-area-inset-bottom))}
@media(min-width:640px){.modal{border-radius:18px}}
.modal.kb{padding-bottom:45vh}
.modal h3{font-size:17px;margin-bottom:12px}
.stat{font-family:var(--serif);font-size:26px;font-weight:700}
.stat-lb{font-size:12px;color:var(--ink2)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;text-align:center}
.bar-wrap{background:var(--card2);border-radius:6px;height:8px;overflow:hidden}
.bar{height:100%;border-radius:6px;background:var(--green)}
.toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:var(--ink);
  color:var(--bg);padding:10px 18px;border-radius:24px;font-size:14px;z-index:99;
  opacity:0;transition:opacity .25s;pointer-events:none;max-width:88vw;text-align:center}
.toast.show{opacity:1}
canvas.chart{width:100%!important}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header>
  <h1><span class="title-text">出租房屋管理</span><span class="month-badge" id="monthBadge" aria-label="目前查看月份"></span></h1>
  <span class="sync-dot off" id="syncDot" title="同步狀態"></span>
  <button class="icon-btn" id="darkBtn" aria-label="切換深色模式">◐</button>
</header>

<main id="view"></main>

<nav class="tabbar">
  <button data-tab="home"  class="act"><span class="ico">▦</span>總覽</button>
  <button data-tab="rent"><span class="ico">￦</span>租金</button>
  <button data-tab="power"><span class="ico">⌁</span>水電</button>
  <button data-tab="fix"><span class="ico">✦</span>設備</button>
  <button data-tab="more"><span class="ico">≡</span>更多</button>
</nav>

<div class="toast" id="toast"></div>

<script>
/* =====================================================================
   出租房屋管理系統 v1.2.7
   架構：本機優先（localStorage）＋ Supabase 雲端同步（離線佇列）
   ===================================================================== */
"use strict";

/* ============================================================
   ★ 預設雲端連線（換版本免重填）
   將 Supabase 連線資料填入下方兩行引號內；
   之後拿到新版本檔案，只要把這兩行複製過去即可。
   所有裝置（含家人手機）第一次開啟就會自動連線。
   ============================================================ */
const DEFAULT_CFG = {
  url: 'https://hqnrhjquhmtxvrsiqxht.supabase.co',
  key: 'sb_publishable_NH-caWYCoHfsaNSfRAgSpA_-RifW1a7'
};

const TABLES = ['buildings','rooms','tenants','leases','rent_payments',
  'meter_readings','electricity_bills','fixtures','replacements','utility_bills'];
const UNIT_PRICE = 4;          // 電費每度
const RENT_DUE_DAY = 10;       // 每月 10 日為繳款期限
const LEASE_ALERT_DAYS = 60;   // 租約到期提醒天數
const LAMP_ALERT_DAYS = 30;    // 耗材更換提醒天數
const SPIKE_RATIO = 1.25;      // 總錶帳單暴增門檻（+25%）
const REMIND_COOLDOWN = 3;     // 催繳提示冷卻天數（避免短期重複催繳）

/* ---------- 催繳聯絡 ---------- */
function remindedRecently(t){ return !!(t&&t.last_reminded&&daysBetween(t.last_reminded,today())<=REMIND_COOLDOWN); }
function remindHint(t){ return remindedRecently(t)?`<span class="pill b">已催繳 ${t.last_reminded.slice(5)}</span>`:''; }
/* 撥打或傳簡訊；電話未登記時當場補登儲存後直接撥出，並記錄催繳日 */
window.contactTenant=function(tid,method,period){
  const t=byId('tenants',tid); if(!t){toast('查無房客資料');return;}
  const go=()=>{
    if(remindedRecently(t)&&t.last_reminded!==today()){
      toast(`提示：${t.last_reminded} 已催繳過，仍繼續執行`);
    }
    t.last_reminded=today(); upsert('tenants',t);
    document.querySelectorAll('.modal-bg').forEach(x=>x.remove());
    if(method==='tel'){ location.href='tel:'+t.phone; }
    else{
      const msg=`您好，提醒您${period?' '+period.replace('-',' 年 ')+' 月':''}房租尚未繳納，再麻煩您了，謝謝。`;
      const sep=/iPhone|iPad|iPod/.test(navigator.userAgent)?'&':'?';
      location.href='sms:'+t.phone+sep+'body='+encodeURIComponent(msg);
    }
    setTimeout(render,500);
  };
  if(!t.phone){
    const m=modal(`<h3>尚未登記電話：${esc(t.name)}</h3>
      <label>電話</label><input id="qp" inputmode="tel" placeholder="09xx-xxx-xxx">
      <button class="btn" style="width:100%;margin-top:14px" id="qs">儲存並${method==='tel'?'撥打':'傳簡訊'}</button>`);
    m.querySelector('#qs').onclick=()=>{
      const v=m.querySelector('#qp').value.trim();
      if(!v){toast('請輸入電話');return;}
      t.phone=v; upsert('tenants',t); m.remove(); go();
    };
  } else go();
};
function contactBtns(t,period){
  if(!t) return '';
  return `<button class="cbtn tel" title="撥打催繳" onclick="event.stopPropagation();contactTenant('${t.id}','tel','${period||''}')">☎\uFE0E</button>
    <button class="cbtn sms" title="傳送簡訊" onclick="event.stopPropagation();contactTenant('${t.id}','sms','${period||''}')">✉\uFE0E</button>`;
}

/* ---------- 狀態 ---------- */
let S = {
  cfg:{url:'',key:''}, dark:false,
  store:Object.fromEntries(TABLES.map(t=>[t,[]])),
  queue:[],                       // 離線待同步 [{op,table,row/id}]
  month: new Date().toISOString().slice(0,7),
};
let sb = null, tab='home', powerTab='read', moreTab='rooms', charts={};

function persist(){ localStorage.setItem('rms1', JSON.stringify(
  {cfg:S.cfg,dark:S.dark,store:S.store,queue:S.queue,month:S.month})); }
function restore(){
  try{ const d = JSON.parse(localStorage.getItem('rms1')||'null');
    if(d){ S={...S,...d}; S.store=Object.assign(Object.fromEntries(TABLES.map(t=>[t,[]])),d.store||{});} }catch(e){}
  // 本機沒有連線資料時，套用檔案內建的預設連線
  if(!S.cfg.url && DEFAULT_CFG.url){ S.cfg.url=DEFAULT_CFG.url; S.cfg.key=DEFAULT_CFG.key; }
}
const uid = ()=> crypto.randomUUID();
const today = ()=> new Date().toISOString().slice(0,10);
const fmt$ = n => 'NT$ ' + (n||0).toLocaleString('zh-TW');
const currentMonth = () => new Date().toISOString().slice(0,7);
function zhMonthLabel(ym){
  const [y,m]=String(ym||currentMonth()).split('-');
  return `${y}年${parseInt(m||'1',10)}月`;
}
function updateMonthBadge(){
  const b=document.getElementById('monthBadge'); if(!b) return;
  const isNow=S.month===currentMonth();
  b.classList.toggle('off-month',!isNow);
  b.textContent=isNow ? zhMonthLabel(S.month) : `非本月｜${zhMonthLabel(S.month)}`;
  b.title=isNow ? '目前查看當月份' : '注意：目前查看的不是本月份';
  b.setAttribute('aria-label', b.title + '：' + zhMonthLabel(S.month));
}
const esc = s => String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const daysBetween=(a,b)=>Math.round((new Date(b)-new Date(a))/86400000);

/* ---------- 雲端同步 ---------- */
function connectSB(){
  if(S.cfg.url && S.cfg.key && window.supabase){
    try{ sb = window.supabase.createClient(S.cfg.url.trim(), S.cfg.key.trim()); }
    catch(e){ sb=null; }
  } else sb=null;
  updateDot();
}
function updateDot(){
  const d=document.getElementById('syncDot');
  d.className='sync-dot '+(!sb?'off':(S.queue.length?'q':'on'));
  d.title = !sb?'未連線雲端':(S.queue.length?`待同步 ${S.queue.length} 筆`:'雲端已同步');
}
async function pullAll(){
  if(!sb) return false;
  try{
    for(const t of TABLES){
      const {data,error} = await sb.from(t).select('*');
      if(error) throw error;
      S.store[t]=data||[];
    }
    persist(); return true;
  }catch(e){ console.warn('pull失敗',e); return false; }
}
async function pushRow(table,row){
  if(!sb){ S.queue.push({op:'upsert',table,row}); persist(); updateDot(); return; }
  const {error} = await sb.from(table).upsert(row);
  if(error){ S.queue.push({op:'upsert',table,row}); persist(); }
  updateDot();
}
async function pushDel(table,id){
  if(!sb){ S.queue.push({op:'del',table,id}); persist(); updateDot(); return; }
  const {error} = await sb.from(table).delete().eq('id',id);
  if(error){ S.queue.push({op:'del',table,id}); persist(); }
  updateDot();
}
async function flushQueue(){
  if(!sb||!S.queue.length) return;
  const q=[...S.queue]; S.queue=[];
  for(const j of q){
    try{
      if(j.op==='upsert'){ const {error}=await sb.from(j.table).upsert(j.row); if(error) S.queue.push(j); }
      else { const {error}=await sb.from(j.table).delete().eq('id',j.id); if(error) S.queue.push(j); }
    }catch(e){ S.queue.push(j); }
  }
  persist(); updateDot();
  if(!S.queue.length) toast('離線資料已全部同步 ✓');
}
window.addEventListener('online',flushQueue);
setInterval(flushQueue, 45000);

/* ---------- 資料操作 ---------- */
function upsert(table,row){
  row.updated_at=new Date().toISOString();
  const arr=S.store[table], i=arr.findIndex(r=>r.id===row.id);
  if(i>=0) arr[i]=row; else arr.push(row);
  persist(); pushRow(table,row);
}
function del(table,id){
  S.store[table]=S.store[table].filter(r=>r.id!==id);
  persist(); pushDel(table,id);
}
const T = t => S.store[t];
const byId=(t,id)=>T(t).find(r=>r.id===id);

/* ---------- 業務邏輯 ---------- */
function roomLabel(r){ const b=byId('buildings',r.building_id); return (b?b.name+' ':'')+r.room_no; }
function activeLease(roomId){ return T('leases').find(l=>l.room_id===roomId&&l.active); }
function tenantOf(roomId){ const l=activeLease(roomId); return l?byId('tenants',l.tenant_id):null; }
function monthlyTotal(r){ return (r.monthly_rent||0)+(r.water_fee||0)+(r.gas_fee||0); }
const DISPUTE_STAGES=['調解委員會','民事訴訟','法院調解','強制執行','債權憑證'];
const DISPUTE_TAG_START='【爭議處理】';
const DISPUTE_TAG_END='【/爭議處理】';
function disputeInfo(l){
  if(!l) return null;
  if(l.dispute_stage) return {stage:l.dispute_stage,note:l.dispute_note||'',date:l.dispute_updated||''};
  const note=String(l.note||'');
  const a=note.indexOf(DISPUTE_TAG_START), b=note.indexOf(DISPUTE_TAG_END);
  if(a<0||b<a) return null;
  const block=note.slice(a+DISPUTE_TAG_START.length,b).trim();
  const data={stage:'',note:'',date:''};
  block.split('｜').forEach(part=>{
    const i=part.indexOf('：');
    if(i>0){ data[part.slice(0,i).trim()]=part.slice(i+1).trim(); }
  });
  const stage=data['程序']||'';
  if(!stage) return null;
  return {stage,note:data['備註']||'',date:data['更新']||''};
}
function disputeBadge(l,small=false){
  const d=disputeInfo(l); if(!d) return '';
  return `<span class="pill law" title="爭議處理程序${d.date?'｜'+d.date:''}">${small?'爭議':'爭議處理'}：${esc(d.stage)}</span>`;
}
function saveDisputeToLease(l,stage,note){
  let base=String(l.note||'');
  const a=base.indexOf(DISPUTE_TAG_START), b=base.indexOf(DISPUTE_TAG_END);
  if(a>=0&&b>=a) base=(base.slice(0,a)+base.slice(b+DISPUTE_TAG_END.length)).trim();
  if(stage){
    const block=`${DISPUTE_TAG_START}程序：${stage}｜更新：${today()}${note?'｜備註：'+note:''}${DISPUTE_TAG_END}`;
    base=base ? `${base}
${block}` : block;
  }
  l.note=base;
}

const MOVEOUT_TAG_START='【退租追蹤】';
const MOVEOUT_TAG_END='【/退租追蹤】';
function taggedInfo(note,start,end){
  note=String(note||'');
  const a=note.indexOf(start), b=note.indexOf(end);
  if(a<0||b<a) return null;
  const block=note.slice(a+start.length,b).trim();
  const data={};
  block.split('｜').forEach(part=>{
    const i=part.indexOf('：');
    if(i>0) data[part.slice(0,i).trim()]=part.slice(i+1).trim();
  });
  return data;
}
function stripTaggedBlock(note,start,end){
  let base=String(note||'');
  const a=base.indexOf(start), b=base.indexOf(end);
  if(a>=0&&b>=a) base=(base.slice(0,a)+base.slice(b+end.length)).trim();
  return base;
}
function moveoutInfo(l){
  if(!l) return null;
  const data=taggedInfo(l.note,MOVEOUT_TAG_START,MOVEOUT_TAG_END);
  if(data) return {date:data['退租日']||'',reading:data['電錶']||'',note:data['備註']||''};
  if(!l.active) return {date:'',reading:l.moveout_reading||'',note:''};
  return null;
}
function saveMoveoutToLease(l,date,reading,note){
  let base=stripTaggedBlock(l.note,MOVEOUT_TAG_START,MOVEOUT_TAG_END);
  const block=`${MOVEOUT_TAG_START}退租日：${date||today()}${reading!==''&&reading!=null?'｜電錶：'+reading:''}${note?'｜備註：'+note:''}${MOVEOUT_TAG_END}`;
  l.note=base ? `${base}
${block}` : block;
}

function leasePayments(leaseId){

// 確保本月份所有出租房都有租金紀錄（僅限租約有效期間內）
function ensurePayments(period){
  T('rooms').filter(r=>r.status==='出租中').forEach(r=>{
    const l=activeLease(r.id); if(!l||!periodOK(l,period)) return;
    if(!T('rent_payments').some(p=>p.lease_id===l.id&&p.period===period)){
      upsert('rent_payments',{id:uid(),lease_id:l.id,room_id:r.id,period,
        amount:monthlyTotal(r),paid:false,paid_date:null,note:''});
    }
  });
  // 清理：起租月之前被誤產生且「未繳」的紀錄（已繳的一律保留不動）
  T('rent_payments').filter(p=>{
    if(p.paid) return false;
    const l=byId('leases',p.lease_id); if(!l) return false;
    const s=(l.start_date||'').slice(0,7);
    return s && p.period<s;
  }).forEach(p=>del('rent_payments',p.id));
}
function isOverdue(p){
  if(p.paid) return false;
  const now=new Date(), cur=now.toISOString().slice(0,7);
  if(p.period<cur) return true;
  if(p.period===cur && now.getDate()>RENT_DUE_DAY) return true;
  return false;
}
function arrears(leaseId){ // 欠繳期數（含本月已逾期）
  return T('rent_payments').filter(p=>p.lease_id===leaseId&&isOverdue(p)).length;
}
function lastReading(roomId,kinds){
  const rs=T('meter_readings').filter(m=>m.room_id===roomId&&(!kinds||kinds.includes(m.kind)))
    .sort((a,b)=>a.reading_date.localeCompare(b.reading_date)||a.updated_at.localeCompare(b.updated_at));
  return rs[rs.length-1]||null;
}
// 耗材：預期壽命（天）
function expectedDays(f){
  if(f.expected_days>0) return f.expected_days;
  if(f.rated_hours>0&&f.daily_hours>0) return Math.round(f.rated_hours/f.daily_hours);
  return 0;
}
// 實際平均壽命（≥2 段更換間隔時採用）
function actualAvgDays(f){
  const rs=T('replacements').filter(x=>x.fixture_id===f.id)
    .map(x=>x.replaced_date).sort();
  if(rs.length<2) return 0;
  let sum=0; for(let i=1;i<rs.length;i++) sum+=daysBetween(rs[i-1],rs[i]);
  return Math.round(sum/(rs.length-1));
}
function fixtureRemain(f){
  if(!f.last_replaced) return null;
  const exp = actualAvgDays(f)||expectedDays(f);
  if(!exp) return null;
  return {exp, used:daysBetween(f.last_replaced,today()), remain: exp - daysBetween(f.last_replaced,today())};
}
// 總錶帳單暴增偵測：與同物件同類前 3 期平均比
function spikeCheck(bill){
  const hist=T('utility_bills').filter(u=>u.building_id===bill.building_id&&u.kind===bill.kind&&u.id!==bill.id
      &&u.updated_at<bill.updated_at).sort((a,b)=>b.updated_at.localeCompare(a.updated_at)).slice(0,3);
  if(!hist.length) return null;
  const avg=hist.reduce((s,u)=>s+u.amount,0)/hist.length;
  return bill.amount>avg*SPIKE_RATIO ? {avg:Math.round(avg),ratio:(bill.amount/avg)} : null;
}

/* 切換主頁或分頁後，強制回到頁面最上方；修正 iPhone 滾動位置沿用造成的下方/中段開頁問題 */

/* 該期是否落在租約有效範圍（起租月之後、且不超過本月） */
function periodOK(l,period){
  const s=(l.start_date||'').slice(0,7);
  if(s && period<s) return false;
  if(!l.active && l.end_date && period>l.end_date.slice(0,7)) return false;
  if(period > new Date().toISOString().slice(0,7)) return false; // 未來月份不預先產生
  return true;
}
/* 剩餘租期文字 */
function remainText(endDate){
  if(!endDate) return '';
  const d=daysBetween(today(),endDate);
  if(d<0) return `已到期 ${-d} 天`;
  const y=Math.floor(d/365), r=d%365;
  return y? `剩 ${y} 年 ${r} 天` : `剩 ${d} 天`;
}
function addYears(dateStr,n,minusOneDay){
  const dt=new Date(dateStr); dt.setFullYear(dt.getFullYear()+n);
  if(minusOneDay) dt.setDate(dt.getDate()-1);
  return dt.toISOString().slice(0,10);
}

  if(S.month>curM) html+=`<div class="alert">「${S.month}」尚未到期，系統不預先產生應收紀錄；到當月會自動建立。</div>`;

  pays.forEach(p=>{
    const r=byId('rooms',p.room_id), l=byId('leases',p.lease_id), t=l?byId('tenants',l.tenant_id):null;
    const od=isOverdue(p);
    // 該房客所有欠繳期別（不含本列期間），直接排在卡列中可點擊
    const owed=l?T('rent_payments').filter(x=>x.lease_id===l.id&&!x.paid&&isOverdue(x)&&x.period!==p.period)

    html+=`<div class="li" style="flex-wrap:wrap">
      <div class="main"><div class="t1">${esc(r?roomLabel(r):'?')} <span class="muted">${t?esc(t.name):''}</span> ${disputeBadge(l,true)}</div>
      <div class="t2"><span class="money">${fmt$(p.amount)}</span>${p.paid&&p.paid_date?'　'+p.paid_date+' 收訖':''}</div>
      ${owed.length?`<div class="t2" style="margin-top:5px">欠 ${owed.length} 期：${owed.map(o=>
        `<span class="pill r chip" style="margin-right:4px" onclick="openPayDetail('${o.id}')">${o.period}</span>`).join('')}</div>`:''}</div>
      ${p.paid
        ? `<button class="btn sm sub" onclick="genRentReceipt('${p.id}')">憑證</button>
           <button class="btn sm sub" onclick="togglePaid('${p.id}',false)">改未繳</button>`
        : `${remindHint(t)}<span class="pill ${od?'r':'a'}">${od?'逾期':'未繳'}</span>
           <button class="btn sm" onclick="togglePaid('${p.id}',true)">收款</button>`}
    </div>`;
  });
  html+=`</div>`;
  // 欠繳總表
  const debt=T('leases').filter(l=>l.active).map(l=>({l,n:arrears(l.id)})).filter(x=>x.n>0);
  if(debt.length){
    html+=`<div class="card"><h2>欠繳追蹤</h2>${debt.map(({l,n})=>{
      const r=byId('rooms',l.room_id),t=byId('tenants',l.tenant_id);

        <div class="t2">累計欠繳 ${n} 期${t&&t.phone?'　'+esc(t.phone):'　未登記電話'}</div></div>
        ${t?contactBtns(t,''):''}</div>`;}).join('')}</div>`;
  }
  V.innerHTML=html;
  document.getElementById('mPick').onchange=e=>{S.month=e.target.value;persist();render();scrollPageTop();};
  const mNow=document.getElementById('mNow');
  if(mNow) mNow.onclick=()=>{S.month=currentMonth();persist();render();scrollPageTop();toast('已回到本月');};
}

/* ---------- 對帳憑證圖片（Canvas） ---------- */
function drawReceipt(lines,title,fname){
  const W=640, rowH=52, H=210+lines.length*rowH+150;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  c.fillStyle='#FBFAF5'; c.fillRect(0,0,W,H);
  c.fillStyle='#2D5A4A'; c.fillRect(0,0,W,92);
  c.fillStyle='#fff'; c.font='bold 30px "Noto Serif TC",serif'; c.textAlign='center';
  c.fillText(title,W/2,58);
  c.textAlign='left'; c.fillStyle='#26312C';
  let y=150;
  lines.forEach(([k,v,strong])=>{
    c.font='17px sans-serif'; c.fillStyle='#5F6B64'; c.fillText(k,54,y);
    c.font=(strong?'bold 26px':'20px')+' "Noto Serif TC",Georgia,serif';
    c.fillStyle=strong?'#B54A35':'#26312C'; c.textAlign='right'; c.fillText(v,W-54,y+(strong?4:0));
    c.textAlign='left';
    c.strokeStyle='#E4E0D2'; c.beginPath(); c.moveTo(54,y+18); c.lineTo(W-54,y+18); c.stroke();
    y+=rowH;
  });
  // 收訖章
  c.strokeStyle='#B54A35'; c.lineWidth=3; c.beginPath(); c.arc(W-130,y+46,44,0,7); c.stroke();
  c.fillStyle='#B54A35'; c.font='bold 24px sans-serif'; c.textAlign='center';
  c.fillText('已收訖',W-130,y+54); c.textAlign='left';
  c.fillStyle='#5F6B64'; c.font='14px sans-serif';
  c.fillText('產生日期：'+today(),54,y+50);
  c.fillText('出租房屋管理系統',54,y+74);
  // 產生後開啟預覽視窗：可下載、可分享（iOS 可長按圖片存入照片）
  const dataUrl=cv.toDataURL('image/png');
  const m=modal(`<h3>${esc(title)}</h3>
    <img src="${dataUrl}" style="width:100%;border-radius:12px;box-shadow:var(--shadow)" alt="憑證">
    <div class="alert" style="margin:10px 0">📱 <b>存入手機相簿</b>：長按上方圖片 → 「加入照片」；或按「分享」→ 「儲存影像」。<br>
    「下載」不會進相簿，會存到「檔案」App 的下載項目（電腦則存到下載資料夾）。</div>
    <div class="row">
      <button class="btn grow" id="rcSh">分享 / 存入相簿</button>
      <button class="btn sub grow" id="rcDl">下載檔案</button>
    </div>`);
  m.querySelector('#rcDl').onclick=()=>{
    const a=document.createElement('a'); a.download=fname; a.href=dataUrl; a.click();
    toast('已存到「檔案」下載項目／電腦下載資料夾');
  };
  m.querySelector('#rcSh').onclick=()=>cv.toBlob(async blob=>{
    try{
      const file=new File([blob],fname,{type:'image/png'});
      if(navigator.canShare&&navigator.canShare({files:[file]})) await navigator.share({files:[file]});
      else toast('此瀏覽器不支援分享，請改用下載或長按圖片');
    }catch(e){}
  },'image/png');
}

window.openReading=function(roomId,editId){
  const r=byId('rooms',roomId);
  const ex=editId?byId('meter_readings',editId):null;
  // 比對基準：排除正在編輯的那筆後的最新讀數
  const prevList=T('meter_readings').filter(m=>m.room_id===roomId&&(!ex||m.id!==ex.id))
    .sort((a,b)=>a.reading_date.localeCompare(b.reading_date));
  const lr=prevList[prevList.length-1]||null;
  const name=r.room_type==='總錶'?(byId('buildings',r.building_id)?.name+' 總錶'):roomLabel(r);
  const m=modal(`<h3>${ex?'編輯讀數':'抄錶'}：${esc(name)}</h3>
    <div class="muted">上次讀數：${lr?lr.value+' 度（'+lr.reading_date+'）':'無'}</div>
    <label>本次讀數（度）</label><input type="number" inputmode="decimal" id="rv" step="0.1" value="${ex?ex.value:''}">
    <label>日期</label><input type="date" id="rd" value="${ex?ex.reading_date:today()}">
    <label>類型</label><select id="rk">${['結算','快抄','退租'].map(k=>`<option ${ex&&ex.kind===k?'selected':''}>${k}</option>`).join('')}</select>
    <label>備註</label><input id="rnote" value="${ex?esc(ex.note||''):''}" placeholder="例：錶面模糊、換新錶歸零、房客反映異常…">
    <label>錶面照片（存證）${ex&&ex.photo_url?'　<a href="'+esc(ex.photo_url)+'" target="_blank">查看現有照片</a>':''}</label>
    <input type="file" id="rp" accept="image/*" capture="environment">
    <div class="row" style="margin-top:16px"><button class="btn grow" id="rs">${ex?'更新讀數':'儲存讀數'}</button></div>`);
  m.querySelector('#rs').onclick=async()=>{
    const v=parseFloat(m.querySelector('#rv').value);
    if(isNaN(v)){toast('請輸入讀數');return;}
    const doSave=async()=>{
      let url=ex?ex.photo_url:'';
      const f=m.querySelector('#rp').files[0];
      if(f){ url=await uploadPhoto(roomId,f); }
      const row=ex||{id:uid(),room_id:roomId};
      Object.assign(row,{reading_date:m.querySelector('#rd').value,value:v,
        kind:m.querySelector('#rk').value,photo_url:url,note:m.querySelector('#rnote').value});
      upsert('meter_readings',row);
      // 快抄異常比對（僅新抄且有歷史時）
      if(!ex&&lr){
        const days=Math.max(1,daysBetween(lr.reading_date,row.reading_date));
        const daily=(v-lr.value)/days;
        if(prevList.length>=3){
          const h0=prevList[0], hd=Math.max(1,daysBetween(h0.reading_date,lr.reading_date));
          const base=(lr.value-h0.value)/hd;
          if(base>0&&daily>base*1.6) toast(`⚠ ${name} 日均用電 ${daily.toFixed(1)} 度，高於歷史 ${base.toFixed(1)} 度，請留意設備異常`);
        }
      }
      m.remove(); toast(ex?'讀數已更新 ✓':'讀數已儲存 ✓'); render();
    };
    if(lr&&v<lr.value){
      confirmBox(`輸入值 ${v} 小於上次讀數 ${lr.value}，可能輸入錯誤或錶已歸零更換。確定儲存？`,doSave);
    } else doSave();
  };
};
async function uploadPhoto(roomId,file){
  if(!sb){ toast('未連線雲端，照片略過（讀數仍會儲存）'); return ''; }
  try{
    const blob=await shrink(file,1280);
    const path=`${roomId}/${today()}_${Date.now()}.jpg`;
    const {error}=await sb.storage.from('meter-photos').upload(path,blob,{contentType:'image/jpeg'});
    if(error) throw error;
    return sb.storage.from('meter-photos').getPublicUrl(path).data.publicUrl;
  }catch(e){ toast('照片上傳失敗（請確認已建立 meter-photos 儲存桶）'); return ''; }
}
function shrink(file,max){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const sc=Math.min(1,max/Math.max(img.width,img.height));
      const cv=document.createElement('canvas');
      cv.width=img.width*sc; cv.height=img.height*sc;
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      cv.toBlob(b=>res(b),'image/jpeg',.82);
    };
    img.src=URL.createObjectURL(file);
  });
}

function powerBill(){
  const bills=T('electricity_bills').slice().sort((a,b)=>b.updated_at.localeCompare(a.updated_at));
  let h=`<div class="card">
    <div class="muted" style="margin-bottom:8px">依各房「最近兩筆結算抄錶」自動計算：度數 × 每度 ${UNIT_PRICE} 元。</div>

    <button class="btn" onclick="makeBills()">建立本期結算</button></div></div>`;
  const groups={};
  bills.forEach(b=>{(groups[b.period_label]=groups[b.period_label]||[]).push(b);});
  Object.keys(groups).forEach(lb=>{
    const g=groups[lb], tot=g.reduce((s,b)=>s+(b.amount||0),0);
    h+=`<div class="card"><h2>${esc(lb)}　<span class="money">${fmt$(tot)}</span></h2>`;
    g.forEach(b=>{
      const r=byId('rooms',b.room_id);

        ${b.paid?`<span class="pill g">已收</span><button class="btn sm sub" onclick="genElecReceipt('${b.id}')">憑證</button>`
          :`<button class="btn sm" onclick="payBill('${b.id}')">收款</button>`}
        <button class="btn sm sub" onclick="delBill('${b.id}')">刪</button></div>`;
    });
    h+=`</div>`;
  });
  if(!bills.length) h+=`<div class="card empty">尚無結算紀錄。先完成兩次「結算抄錶」後，即可建立結算單。</div>`;
  return h;

window.makeBills=function(){
  const lb=document.getElementById('plabel').value.trim();
  if(!lb){toast('請先輸入結算期間名稱');return;}
  if(T('electricity_bills').some(b=>b.period_label===lb)){toast('此期間名稱已存在');return;}
  let n=0;
  T('rooms').filter(r=>!['倉庫','總錶'].includes(r.room_type)&&r.status!=='停用').forEach(r=>{
    const rs=T('meter_readings').filter(m=>m.room_id===r.id&&['結算','退租'].includes(m.kind))
      .sort((a,b)=>a.reading_date.localeCompare(b.reading_date));
    if(rs.length<2) return;
    const a=rs[rs.length-2], b=rs[rs.length-1];
    const use=Math.round((b.value-a.value)*10)/10;
    if(use<0) return;
    upsert('electricity_bills',{id:uid(),room_id:r.id,period_label:lb,start_reading:a.value,
      end_reading:b.value,usage_kwh:use,unit_price:UNIT_PRICE,amount:Math.round(use*UNIT_PRICE),
      paid:false,paid_date:null});
    n++;
  });
  toast(n?`已建立 ${n} 間結算單 ✓`:'沒有可結算的房間（每間需至少兩筆結算抄錶）');
  render();
};

function powerUtil(){
  const bills=T('utility_bills').slice().sort((a,b)=>b.updated_at.localeCompare(a.updated_at));
  let h=`<div class="card"><div class="muted" style="margin-bottom:8px">
    記錄繳給台水、台電、瓦斯行的<b>總錶帳單</b>。租客水瓦斯收固定月費，若總錶暴增（＋25%）代表可能漏水漏氣，系統會警示。</div>
    <button class="btn" style="width:100%" onclick="openUtilForm()">＋ 新增總錶帳單</button></div><div class="card">`;
  if(!bills.length) h+=`<div class="empty">尚無帳單紀錄</div>`;
  bills.forEach(u=>{
    const b=byId('buildings',u.building_id), sp=spikeCheck(u);
    h+=`<div class="li"><div class="main">
      <div class="t1">${esc(b?b.name:'')}｜${esc(u.kind)}費　<span class="money">${fmt$(u.amount)}</span>
        ${sp?`<span class="pill r">暴增 +${Math.round((sp.ratio-1)*100)}%</span>`:''}</div>
      <div class="t2">${esc(u.period_label)}${u.usage_amount?'　'+u.usage_amount+' 度':''}${sp?'　前期平均 '+fmt$(sp.avg):''}</div></div>
      <button class="btn sm sub" onclick="delUtil('${u.id}')">刪</button></div>`;
  });
  return h+`</div>`;
}
window.openUtilForm=function(){
  const m=modal(`<h3>新增總錶帳單</h3>
    <label>物件</label><select id="ub">${T('buildings').map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('')}</select>
    <label>類別</label><select id="uk"><option>水</option><option>電</option><option>瓦斯</option></select>
    <label>帳單期間（例：2026-05/06）</label><input id="up" placeholder="2026-05/06">
    <label>金額（元）</label><input id="ua" type="number" inputmode="numeric">
    <label>度數（可留空）</label><input id="uu" type="number" inputmode="decimal">
    <button class="btn" style="width:100%;margin-top:16px" id="us">儲存</button>`);
  m.querySelector('#us').onclick=()=>{
    const amt=parseInt(m.querySelector('#ua').value);
    if(!amt){toast('請輸入金額');return;}
    const row={id:uid(),building_id:m.querySelector('#ub').value,kind:m.querySelector('#uk').value,
      period_label:m.querySelector('#up').value||today().slice(0,7),amount:amt,
      usage_amount:parseFloat(m.querySelector('#uu').value)||null,note:''};
    upsert('utility_bills',row);
    const sp=spikeCheck(row);
    m.remove(); render();
    toast(sp?`⚠ 比前期平均高 ${Math.round((sp.ratio-1)*100)}%，建議檢查漏${row.kind==='水'?'水':'損'}`:'帳單已儲存 ✓');
  };
};
window.delUtil=id=>confirmBox('刪除這筆帳單？',()=>{del('utility_bills',id);render();});

function initTrend(){
  Object.values(charts).forEach(c=>c.destroy()); charts={};
  const selR=document.getElementById('trRoom');
  const rooms=T('rooms').filter(r=>r.room_type!=='倉庫'&&r.status!=='停用');
  selR.innerHTML=rooms.map(r=>`<option value="${r.id}">${esc(r.room_type==='總錶'?(byId('buildings',r.building_id)?.name+' 總錶'):roomLabel(r))}</option>`).join('');
  const drawR=()=>{
    const bills=T('electricity_bills').filter(b=>b.room_id===selR.value)
      .sort((a,b)=>a.updated_at.localeCompare(b.updated_at));
    if(charts.c1)charts.c1.destroy();
    charts.c1=new Chart(document.getElementById('ch1'),{type:'bar',
      data:{labels:bills.map(b=>b.period_label),
        datasets:[{label:'用電度數',data:bills.map(b=>b.usage_kwh),
          backgroundColor:getComputedStyle(document.documentElement).getPropertyValue('--green')}]},
      options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
  };
  selR.onchange=drawR; if(rooms.length)drawR();
  const selB=document.getElementById('trBldg'), selK=document.getElementById('trKind');
  selB.innerHTML=T('buildings').map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('');
  const drawU=()=>{
    const us=T('utility_bills').filter(u=>u.building_id===selB.value&&u.kind===selK.value)
      .sort((a,b)=>a.updated_at.localeCompare(b.updated_at));
    if(charts.c2)charts.c2.destroy();
    charts.c2=new Chart(document.getElementById('ch2'),{type:'line',
      data:{labels:us.map(u=>u.period_label),
        datasets:[{label:'金額',data:us.map(u=>u.amount),tension:.3,
          borderColor:getComputedStyle(document.documentElement).getPropertyValue('--blue'),fill:false}]},
      options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
  };
  selB.onchange=drawU; selK.onchange=drawU; if(T('buildings').length)drawU();
}

function viewFix(){
  let html=`<div class="card"><div class="row">
    <div class="muted grow">預測邏輯：初期用「額定壽命 ÷ 每日時數」估算；累積兩次以上實際更換後，改採實際平均壽命。</div>
    <button class="btn sm" onclick="openFixForm()">＋ 新增</button></div></div>`;
  T('buildings').forEach(b=>{
    const fs=T('fixtures').filter(f=>f.building_id===b.id);
    if(!fs.length) return;
    html+=`<div class="bldg-title">${esc(b.name)}</div><div class="card">`;
    fs.forEach(f=>{
      const x=fixtureRemain(f);
      const avg=actualAvgDays(f);
      let pill='', bar=0;
      if(x){ bar=Math.min(100,Math.max(0,Math.round(x.used/x.exp*100)));
        pill=x.remain<0?`<span class="pill r">超期 ${-x.remain} 天</span>`
          :x.remain<=LAMP_ALERT_DAYS?`<span class="pill a">剩 ${x.remain} 天</span>`
          :`<span class="pill g">剩 ${x.remain} 天</span>`; }
      html+=`<div class="li" style="flex-wrap:wrap">
        <div class="main"><div class="t1">${esc(f.location)} <span class="muted">${esc(f.item_type)}・${esc(f.model)}</span></div>
        <div class="t2">上次更換 ${f.last_replaced||'未設定'}${x?'｜預期 '+x.exp+' 天':''}${avg?'（實測平均 '+avg+' 天）':''}</div>
        ${x?`<div class="bar-wrap" style="margin-top:5px"><div class="bar" style="width:${bar}%;background:${x.remain<0?'var(--red)':x.remain<=LAMP_ALERT_DAYS?'var(--amber)':'var(--green)'}"></div></div>`:''}</div>
        ${pill}
        <button class="btn sm" onclick="doReplace('${f.id}')">更換</button>
        <button class="btn sm sub" onclick="openFixForm('${f.id}')">編</button></div>`;
    });
    html+=`</div>`;
  });
  // 庫存備料建議
  const soon=T('fixtures').map(f=>({f,x:fixtureRemain(f)})).filter(o=>o.x&&o.x.remain<=90);
  if(soon.length){
    const cnt={};
    soon.forEach(o=>cnt[o.f.model]=(cnt[o.f.model]||0)+1);
    html+=`<div class="card"><h2>90 天內備料建議</h2>${Object.entries(cnt).map(([m,n])=>
      `<div class="li"><div class="main"><div class="t1">${esc(m)}</div></div><span class="pill b">建議備 ${n} 個</span></div>`).join('')}</div>`;
  }
  if(!T('fixtures').length) html+=`<div class="card empty">尚無設備資料</div>`;
  V.innerHTML=html;
}
window.doReplace=function(id){
  const f=byId('fixtures',id);
  confirmBox(`登記「${f.location}」今日已更換？`,()=>{
    upsert('replacements',{id:uid(),fixture_id:id,replaced_date:today(),note:''});
    f.last_replaced=today(); upsert('fixtures',f);
    toast('更換已登記，週期重新起算 ✓'); render();
  });
};

function moreTenants(){
  const pending=T('rooms').filter(r=>r.status==='出租中'&&!activeLease(r.id));
  let h=`<div class="card"><div class="row" style="flex-direction:column;align-items:stretch;gap:8px">
    ${pending.length?`<button class="btn" onclick="openBulkLease()">⚡ 批次補登出租中房間（${pending.length} 間）</button>`:''}
    <button class="btn ${pending.length?'sub':''}" onclick="openLeaseForm()">＋ 新租約（含房客）</button>
  </div></div><div class="card"><h2>進行中租約</h2>`;
  const ls=T('leases').filter(l=>l.active);
  if(!ls.length) h+=`<div class="empty">尚無租約</div>`;
  ls.forEach(l=>{
    const r=byId('rooms',l.room_id), t=byId('tenants',l.tenant_id);
    const d=l.end_date?daysBetween(today(),l.end_date):null;
    const rt=remainText(l.end_date);
    h+=`<div class="li"><div class="main">
      <div class="t1">${esc(r?roomLabel(r):'?')}　${t?esc(t.name):''}
        ${rt?`<span class="pill ${d<0?'r':d<=LEASE_ALERT_DAYS?'a':'g'}" style="margin-left:4px">${rt}</span>`:'<span class="pill gr">未設到期日</span>'} ${disputeBadge(l,true)}</div>
      <div class="t2">${l.start_date||'—'} ～ ${l.end_date||'—'}　押金 ${fmt$(l.deposit)}${l.contract_no?'　契約 '+esc(l.contract_no):''}</div></div>
      <button class="btn sm sub" onclick="openDisputeForm('${l.id}')">訴訟程序</button>
      <button class="btn sm sub" onclick="openLeaseForm('${l.id}')">編輯</button>
      <button class="btn sm warn" onclick="moveOut('${l.id}')">退租</button></div>`;
  });
  h+=`</div><div class="card"><h2>房客名冊</h2>`;
  if(!T('tenants').length) h+=`<div class="empty">尚無房客資料</div>`;
  T('tenants').forEach(t=>{
    const al=T('leases').find(l=>l.active&&l.tenant_id===t.id);
    const ll=al||latestLeaseByTenant(t.id);
    const mi=ll&&!ll.active?moveoutInfo(ll):null;
    h+=`<div class="li"><div class="main"><div class="t1">${esc(t.name)} ${al?'':ll?'<span class="pill gr">退租</span>':''} ${disputeBadge(ll,true)}</div>
      <div class="t2">${esc(t.phone)}　緊急：${esc(t.emergency_name)} ${esc(t.emergency_phone)}${mi&&mi.date?'　退租日：'+esc(mi.date):''}</div></div>
      ${t.phone?`<a class="btn sm sub" href="tel:${esc(t.phone)}">撥打</a>`:''}
      ${ll&&!ll.active?`<button class="btn sm sub" onclick="openMoveoutTrack('${ll.id}')">退租追蹤</button>`:''}
      <button class="btn sm sub" onclick="openTenantForm('${t.id}')">編輯</button></div>`;
  });
  return h+`</div>`;
}

      ${pays.length?pays.map(p=>`<div class="li"><div class="main"><div class="t1">${p.period}</div><div class="t2"><span class="money">${fmt$(p.amount)}</span>${p.paid_date?'　'+p.paid_date+' 收':''}</div></div>

        ${p.paid?`<button class="btn sm sub" onclick="togglePaidInModal('${p.id}',false,this)">改未結</button><button class="btn sm sub" onclick="genRentReceipt('${p.id}')">憑證</button>`:`<button class="btn sm" onclick="togglePaidInModal('${p.id}',true,this)">登記收款</button>${t?contactBtns(t,p.period):''}`}</div>`).join(''):'<div class="empty">此租約尚無租金紀錄</div>'}
    </div>
    <div class="row">
      <button class="btn grow" id="mtLaw">訴訟程序</button>
      <button class="btn sub grow" id="mtEditT">編輯房客</button>
    </div>`);
  m.querySelector('#mtLaw').onclick=()=>{m.remove();openDisputeForm(leaseId);};
  m.querySelector('#mtEditT').onclick=()=>{m.remove(); if(t) openTenantForm(t.id);};
};
window.togglePaidInModal=function(id,val,btn){
  const p=byId('rent_payments',id); if(!p)return;
  p.paid=val; p.paid_date=val?today():null; upsert('rent_payments',p);
  const l=byId('leases',p.lease_id);
  toast(val?'已登記收款 ✓':'已改為未結');
  document.querySelectorAll('.modal-bg').forEach(x=>x.remove());
  if(l&&!l.active) openMoveoutTrack(l.id); else render();
};

    <label>電話</label><input id="tp" value="${esc(t.phone)}" inputmode="tel">

/* 批次補登：所有出租中但尚無租約的房間，一個畫面填完一鍵建立 */
window.openBulkLease=function(){
  const pending=T('rooms').filter(r=>r.status==='出租中'&&!activeLease(r.id))
    .sort((a,b)=>roomLabel(a).localeCompare(roomLabel(b),'zh-Hant'));
  if(!pending.length){toast('沒有待補登的房間');return;}
  const m=modal(`<h3>批次補登房客（${pending.length} 間）</h3>
    <div class="muted" style="margin-bottom:8px">填姓名即建立；留白的房間會跳過，之後可再補。電話與到期日可先空著日後編輯。</div>
    <div class="row"><div class="grow"><label>起租日（套用全部）</label><input type="date" id="bkS" value="${today()}"></div>
    <div class="grow"><label>押金</label><select id="bkD"><option value="1">一個月租金</option><option value="0">0（稍後填）</option></select></div></div>
    <div class="divider"></div>
    ${pending.map((r,i)=>`<div class="row" style="margin-bottom:8px">
      <div style="width:118px;flex:none"><b>${esc(r.room_no)}</b><div class="muted" style="font-size:11px">${esc(byId('buildings',r.building_id)?.name||'')}</div></div>
      <input id="bkN${i}" placeholder="姓名" class="grow">
      <input id="bkP${i}" placeholder="電話" inputmode="tel" class="grow"></div>`).join('')}
    <button class="btn" style="width:100%;margin-top:12px" id="bkGo">一鍵建立全部</button>`);
  m.querySelector('#bkGo').onclick=()=>{
    const sd=m.querySelector('#bkS').value, dep=m.querySelector('#bkD').value==='1';
    let n=0;
    pending.forEach((r,i)=>{
      const name=m.querySelector('#bkN'+i).value.trim();
      if(!name) return;
      const t={id:uid(),name,phone:m.querySelector('#bkP'+i).value.trim(),
        emergency_name:'',emergency_phone:'',note:''};
      upsert('tenants',t);
      upsert('leases',{id:uid(),room_id:r.id,tenant_id:t.id,start_date:sd,end_date:null,
        deposit:dep?(r.monthly_rent||0):0,prepaid_months:0,active:true,note:'批次補登'});
      n++;
    });
    m.remove(); render();
    toast(n?`已建立 ${n} 間房客與租約 ✓`:'未填任何姓名，未建立資料');
  };
};

window.openLeaseForm=function(id){
  const l=id?byId('leases',id):{id:uid(),room_id:'',tenant_id:'',start_date:today(),end_date:'',
    deposit:0,prepaid_months:0,active:true,contract_no:'',note:''};
  // 可選房間：尚無進行中租約者（含補登既有房客的出租中房間）；編輯時保留原房間
  const vac=T('rooms').filter(r=>!['倉庫','總錶'].includes(r.room_type)&&r.status!=='停用'&&(!activeLease(r.id)||r.id===l.room_id));
  if(!vac.length){ toast('所有房間都已有進行中租約'); return; }
  const m=modal(`<h3>${id?'編輯租約':'新租約'}</h3>
    <label>房間</label><select id="lr">${vac.map(r=>`<option value="${r.id}" ${r.id===l.room_id?'selected':''}>${esc(roomLabel(r))}（${esc(r.status)}）</option>`).join('')}</select>
    <label>房客</label><div class="row"><select id="lt" class="grow">
      <option value="">— 選擇既有房客 —</option>
      ${T('tenants').map(t=>`<option value="${t.id}" ${t.id===l.tenant_id?'selected':''}>${esc(t.name)}</option>`).join('')}</select>
      <button class="btn sm sub" id="lnew">新房客</button></div>
    <div class="row"><div class="grow"><label>起租日</label><input id="ls" type="date" value="${l.start_date||''}"></div>
    <div class="grow"><label>到期日</label><input id="le" type="date" value="${l.end_date||''}"></div></div>
    <label>快速設定（以年簽約）</label>
    <div class="row">
      <button class="btn sm sub" data-yr="1">簽 1 年</button>
      <button class="btn sm sub" data-yr="2">簽 2 年</button>
      <button class="btn sm sub" data-yr="3">簽 3 年</button>
      <span style="width:8px"></span>
      <button class="btn sm sub" data-adj="1">到期 +1 年</button>
      <button class="btn sm sub" data-adj="-1">到期 −1 年</button>
    </div>
    <div class="row"><div class="grow"><label>押金（元）</label><input id="ld" type="number" value="${l.deposit}"></div>
    <div class="grow"><label>預繳月數</label><input id="lp" type="number" value="${l.prepaid_months}"></div></div>
    <label>契約書編碼</label><input id="lc" value="${esc(l.contract_no||'')}" placeholder="例：2026-A-201">
    <button class="btn" style="width:100%;margin-top:16px" id="lsv">儲存租約</button>`);
  m.querySelector('#lnew').onclick=()=>{m.remove();openTenantForm();};
  // 快速年份：簽 N 年＝起租日＋N年−1天；+1/−1年＝就現有到期日調整
  m.querySelectorAll('[data-yr]').forEach(b=>b.onclick=()=>{
    const sd=m.querySelector('#ls').value;
    if(!sd){toast('請先填起租日');return;}
    m.querySelector('#le').value=addYears(sd,+b.dataset.yr,true);
  });
  m.querySelectorAll('[data-adj]').forEach(b=>b.onclick=()=>{
    const ed=m.querySelector('#le').value||m.querySelector('#ls').value;
    if(!ed){toast('請先填起租日或到期日');return;}
    m.querySelector('#le').value=addYears(ed,+b.dataset.adj,false);
  });
  m.querySelector('#lsv').onclick=()=>{
    const rid=m.querySelector('#lr').value, tid=m.querySelector('#lt').value;
    if(!rid||!tid){toast('請選擇房間與房客');return;}
    Object.assign(l,{room_id:rid,tenant_id:tid,start_date:m.querySelector('#ls').value,
      end_date:m.querySelector('#le').value||null,deposit:+m.querySelector('#ld').value,
      prepaid_months:+m.querySelector('#lp').value,contract_no:m.querySelector('#lc').value.trim()});
    upsert('leases',l);
    const r=byId('rooms',rid); if(r.status!=='出租中'){r.status='出租中';upsert('rooms',r);}
    m.remove(); toast('租約已儲存，房間狀態更新為出租中 ✓'); render();
  };
};
window.openDisputeForm=function(leaseId){
  const l=byId('leases',leaseId); if(!l){toast('查無租約');return;}
  const r=byId('rooms',l.room_id), t=byId('tenants',l.tenant_id), d=disputeInfo(l)||{stage:'',note:'',date:''};
  const m=modal(`<h3>訴訟／爭議處理：${esc(r?roomLabel(r):'')} ${t?esc(t.name):''}</h3>
    <div class="alert">這裡只是管理標記，方便你辨識該房客已進入爭議處理；不會自動產生法律文件。</div>
    <label>目前程序</label><select id="ds"><option value="">無／解除標記</option>
      ${DISPUTE_STAGES.map(x=>`<option value="${x}" ${x===d.stage?'selected':''}>${x}</option>`).join('')}</select>
    <label>備註</label><textarea id="dn" rows="4" placeholder="例：已送調解、案號、承辦股別、下次開庭日…">${esc(d.note||'')}</textarea>
    ${d.date?`<div class="muted" style="margin-top:8px">上次更新：${esc(d.date)}</div>`:''}
    <div class="row" style="margin-top:16px"><button class="btn grow" id="dsv">儲存標記</button>
    <button class="btn sub grow" id="dcl">解除標記</button></div>`);
  m.querySelector('#dsv').onclick=()=>{
    saveDisputeToLease(l,m.querySelector('#ds').value,m.querySelector('#dn').value.trim());
    upsert('leases',l); m.remove(); toast(l.dispute_stage||disputeInfo(l)?'已更新爭議處理標記':'已解除爭議處理標記'); render();
  };
  m.querySelector('#dcl').onclick=()=>{
    saveDisputeToLease(l,'',''); upsert('leases',l); m.remove(); toast('已解除爭議處理標記'); render();
  };

window.moveOut=function(leaseId){
  const l=byId('leases',leaseId); const r=byId('rooms',l.room_id); const t=byId('tenants',l.tenant_id);
  const lr=lastReading(l.room_id);
  const m=modal(`<h3>退租結算：${esc(r?roomLabel(r):'')} ${t?esc(t.name):''}</h3>
    <div class="muted">上次電錶讀數：${lr?lr.value+' 度（'+lr.reading_date+'）':'無'}</div>
    <label>退租日電錶讀數</label><input id="mv" type="number" inputmode="decimal" step="0.1">
    <label>退租日期</label><input id="md" type="date" value="${today()}">
    <label>退租後追蹤備註</label><textarea id="mnote" rows="3" placeholder="例：押金爭議、欠租、設備損壞、準備調解或訴訟…"></textarea>
    <div class="card" id="mcalc" style="margin-top:12px"></div>
    <div class="alert">確認後：房間會改為空房；此房客與未結租金會移到「更多 → 退租追蹤」。</div>
    <button class="btn warn" style="width:100%;margin-top:8px" id="mok">確認退租</button>`);
  const calc=()=>{
    const v=parseFloat(m.querySelector('#mv').value);
    let elec=0, txt='';
    if(!isNaN(v)&&lr){ elec=Math.max(0,Math.round((v-lr.value)*UNIT_PRICE));
      txt=`未結電費：${(v-lr.value).toFixed(1)} 度 × ${UNIT_PRICE} 元 = <b class="money">${fmt$(elec)}</b><br>`; }
    m.querySelector('#mcalc').innerHTML=`${txt}押金 <b class="money">${fmt$(l.deposit)}</b> － 未結電費 = 
      應退 <b class="money" style="color:var(--green)">${fmt$(Math.max(0,l.deposit-elec))}</b>
      <div class="muted" style="margin-top:4px">（如有欠繳租金或損壞扣款，請再自行扣除）</div>`;
  };
  m.querySelector('#mv').oninput=calc; calc();
  m.querySelector('#mok').onclick=()=>{
    const v=parseFloat(m.querySelector('#mv').value);
    if(!isNaN(v)) upsert('meter_readings',{id:uid(),room_id:l.room_id,
      reading_date:m.querySelector('#md').value,value:v,kind:'退租',photo_url:'',note:'退租結算'});
    l.active=false;
    saveMoveoutToLease(l,m.querySelector('#md').value,isNaN(v)?'':v,m.querySelector('#mnote').value.trim());
    upsert('leases',l);
    r.status='空房'; upsert('rooms',r);
    moreTab='moveout'; tab='more';
    document.querySelectorAll('nav.tabbar button').forEach(x=>x.classList.toggle('act',x.dataset.tab==='more'));
    m.remove(); toast('退租完成，房間已改為空房，資料已移到退租追蹤 ✓'); render(); scrollPageTop();
  };
};

  return `<div class="card"><h2>雲端連線（Supabase）</h2>

    <div class="row" style="margin-top:14px">
      <button class="btn grow" onclick="saveConn()">儲存並連線</button>
      <button class="btn sub" onclick="doPull()">從雲端重新載入</button></div>
    <div class="muted" style="margin-top:8px">狀態：<span id="connSt">${sb?'已連線':'未連線'}</span>${S.queue.length?`　待同步 ${S.queue.length} 筆`:''}</div>
    <div class="muted" style="margin-top:4px">提示：連線資料可直接填入檔案開頭的 DEFAULT_CFG 區塊，換版本或新裝置免重填。</div>
  </div>
  <div class="card"><h2>資料</h2>
    <div class="row" style="flex-direction:column;align-items:stretch;gap:8px">
      <button class="btn sub" onclick="seedData()">建立種子資料（4 處物件・19 房・燈點）</button>
      <button class="btn sub" onclick="exportCSV()">匯出全部資料（CSV 備份）</button>
    </div>

  </div>
  <div class="card"><h2>系統參數</h2>
    <div class="li"><div class="main"><div class="t1">電費單價</div></div><span class="money">每度 ${UNIT_PRICE} 元</span></div>
    <div class="li"><div class="main"><div class="t1">繳款期限</div></div><span>每月 ${RENT_DUE_DAY} 日</span></div>
    <div class="li"><div class="main"><div class="t1">租約到期提醒</div></div><span>前 ${LEASE_ALERT_DAYS} 天</span></div>
    <div class="li"><div class="main"><div class="t1">總錶暴增門檻</div></div><span>＋${Math.round((SPIKE_RATIO-1)*100)}%</span></div>
    <div class="muted" style="margin-top:6px">v1.2.7　新增退租後追蹤管理；退租後房間自動回空房，該房客租金與爭議／訴訟程序集中管理。保留回到本月、月份警示與 iPhone 操作修正。</div>
  </div>`;

window.saveConn=async function(){
  S.cfg.url=document.getElementById('su').value.trim();
  S.cfg.key=document.getElementById('sk').value.trim();
  persist(); connectSB();
  if(!sb){toast('請填入 URL 與金鑰');return;}
  const {error}=await sb.from('buildings').select('id').limit(1);
  if(error){ toast('連線失敗：'+error.message); sb=null; updateDot(); }
  else { toast('連線成功 ✓ 正在載入雲端資料…'); await pullAll(); await flushQueue(); render(); }
};
window.doPull=async function(){
  if(!sb){toast('尚未連線');return;}
  confirmBox('從雲端重新載入會以雲端資料覆蓋本機快取（不影響雲端）。繼續？',async()=>{
    const ok=await pullAll(); toast(ok?'已載入雲端最新資料 ✓':'載入失敗'); render();
  });
};
window.exportCSV=function(){
  TABLES.forEach(t=>{
    const rows=T(t); if(!rows.length) return;
    const keys=[...new Set(rows.flatMap(r=>Object.keys(r)))];
    const csv='\uFEFF'+[keys.join(','),...rows.map(r=>keys.map(k=>
      `"${String(r[k]??'').replace(/"/g,'""')}"`).join(','))].join('\n');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download=`${t}_${today()}.csv`; a.click();
  });
  toast('CSV 匯出完成');
};

/* ---------- 路由 ---------- */
function render(){
  updateMonthBadge();
  Object.values(charts).forEach(c=>c.destroy()); charts={};
  if(tab==='home') viewHome();
  else if(tab==='rent') viewRent();
  else if(tab==='power') viewPower();
  else if(tab==='fix') viewFix();
  else viewMore();
}

/* ---------- 啟動 ---------- */
restore();
document.documentElement.dataset.theme=S.dark?'dark':'light';
connectSB();
render();
if(sb){ pullAll().then(ok=>{ if(ok){flushQueue();render();} }); }
</script>
